# Local / base compose. For staging or production, supply env values via an
# env file (e.g. `docker compose --env-file .env.production up -d --build`)
# and point FRONTEND_API_URL / CORS_ORIGINS at the real hosts.

services:
  backend:
    image: registry.gitlab.bsmch.net/u8883786/kiryata-bot/backend:${BACKEND_TAG:-latest}
    build: ./backend
    # Load real config straight from backend/.env into the container.
    # (The image build excludes .env via .dockerignore, so it must be injected here.)
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Empty → the SPA uses same-origin relative "/api" calls, which nginx
        # proxies to the backend below. No CORS, no host-mapped backend needed.
        VITE_API_BASE_URL: ${FRONTEND_API_URL:-}
    environment:
      # nginx forwards /api/ here — the in-network backend service.
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      - backend
    restart: unless-stopped
