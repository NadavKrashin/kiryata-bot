server {
    # High port so nginx can bind without root (OpenShift restricted SCC).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend over the cluster-internal Service,
    # so the browser only ever talks to the frontend's origin (no CORS, no
    # separate backend Route needed). BACKEND_URL is substituted at container
    # start by the nginx image's envsubst entrypoint, e.g.:
    #   docker compose:  http://backend:8000
    #   OpenShift:       http://<backend-service>.<namespace>.svc.cluster.local:8000
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
